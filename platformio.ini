; ChimeraBLE - ESP32 BLE security & reverse-engineering platform (formerly BLE_RE_Tool)
;
; Two build targets, both on the pioarduino platform (Arduino-ESP32 3.x /
; ESP-IDF 5.5) so they share one framework package - mixing the mainline
; espressif32 platform with pioarduino collides on the framework-arduinoespressif32
; package directory and the two clobber each other.
;
;   esp32dev      ESP32 WROOM (classic Xtensa)   - serial CLI front-end
;   xiao_esp32c5  Seeed Studio XIAO ESP32-C5      - serial CLI front-end
;   cardputer     M5Stack Cardputer ADV (ESP32-S3) - on-device M5 UI front-end
;
; All three share the engine modules (scanner/connection/gatt/adv_parser/uuid_db/
; hid_parser/oui_db/fingerprint/clone/hexdump/log). build_src_filter swaps the
; front-end: serial targets use main.cpp + cli.cpp; cardputer uses src/ui/ (App+UI)
; and excludes the serial main.cpp.
;
; NimBLE roles / connection count come from the IDF prebuilt sdkconfig (all
; roles enabled, MAX_CONNECTIONS=3). Don't override CONFIG_BT_NIMBLE_* on the
; command line - it triggers redefinition warnings against sdkconfig.h.

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.34/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
monitor_filters = direct

board_build.filesystem = littlefs
; default.csv gives a ~1.375 MB LittleFS partition - room for the ~1.1 MB OUI DB
; (data/oui.bin) plus clone profiles. Flash data with `pio run -t uploadfs`.
board_build.partitions = default.csv

build_flags =
    -DCORE_DEBUG_LEVEL=1

lib_deps =
    h2zero/NimBLE-Arduino@^2.1.0
    bblanchon/ArduinoJson@^7.0.0

[env:esp32dev]
board = esp32dev
upload_speed = 921600
build_src_filter = +<*> -<ui/>

[env:xiao_esp32c5]
board = seeed_xiao_esp32c5
upload_speed = 460800
build_src_filter = +<*> -<ui/>

; M5Stack Cardputer ADV (Stamp-S3A / ESP32-S3FN8, 8 MB flash). Native on-device
; UI - runs the full BLE engine + an M5 menu UI on the S3's own BLE radio.
; Use the m5stack-stamps3 board (the Cardputer's core module): it sets the
; -DARDUINO_M5Stack_StampS3 identity + correct variant that M5Unified needs to
; configure the display/keyboard. The generic esp32-s3-devkitc-1 board lacks
; that identity, so M5 mis-inits the hardware and the device boot-loops.
[env:cardputer]
board = m5stack-stamps3
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv
upload_speed = 921600
build_src_filter = +<*> -<main.cpp>
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    ${env.lib_deps}
    M5Cardputer=https://github.com/m5stack/M5Cardputer
